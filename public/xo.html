<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X O vs Bot - LudoX</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #FF4757;
      --blue: #2E86FF;
      --green: #2ED573;
      --yellow: #FFD32A;
      --navy: #0D1B3E;
      --text: #C8D6F0;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--white);
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(13,27,62,0.92);
      backdrop-filter: blur(8px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--white);
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--yellow), #FF9500);
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 800;
      cursor: pointer;
      color: var(--white);
      background: linear-gradient(135deg, var(--blue), #1a6edb);
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 30px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .game-container {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }

    .title {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 18px;
      font-size: 0.9rem;
    }

    .status {
      text-align: center;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--yellow);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
      width: 100%;
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      padding: 0;
      min-height: 110px;
    }

    .cell:hover:not(:disabled) {
      transform: translateY(-3px);
      border-color: var(--blue);
      background: rgba(46,134,255,0.12);
    }

    .cell:disabled {
      cursor: not-allowed;
    }

    .cell.x { color: var(--red); }
    .cell.o { color: var(--green); }

    .score {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .score-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .score-item b {
      font-size: 1.5rem;
      display: block;
      color: var(--yellow);
    }

    .score-item span {
      font-size: 0.9rem;
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.24);
    }

    .history-container {
      width: 100%;
      max-width: 320px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      height: fit-content;
      max-height: 600px;
      display: flex;
      flex-direction: column;
    }

    .history-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      margin-bottom: 16px;
      text-align: center;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-list::-webkit-scrollbar {
      width: 6px;
    }

    .history-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }

    .history-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px;
      transition: transform 0.2s;
    }

    .history-item:hover {
      transform: translateX(4px);
      background: rgba(255,255,255,0.08);
    }

    .history-item.win {
      border-left: 4px solid var(--green);
    }

    .history-item.loss {
      border-left: 4px solid var(--red);
    }

    .history-item.draw {
      border-left: 4px solid var(--yellow);
    }

    .history-result {
      font-weight: 800;
      font-size: 1.1rem;
    }

    .history-time {
      color: var(--text);
      font-size: 0.85rem;
    }

    .history-empty {
      text-align: center;
      color: var(--text);
      padding: 40px 20px;
      font-style: italic;
    }

    @media (max-width: 768px) {
      main {
        gap: 20px;
      }

      .game-container, .history-container {
        max-width: 100%;
      }

      .cell {
        min-height: 90px;
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="logo" id="backProfile" href="/profile">
      <span class="logo-icon">🎲</span>
      <span>LudoX</span>
    </a>
    <button class="btn" id="backBtn">Back to Profile</button>
  </nav>

  <main>
    <section class="game-container">
      <h1 class="title">❌ ⭕ X O</h1>
      <p class="subtitle">Offline mode • Play against bot (1v1)</p>
      <div class="status" id="statusText">Your turn (X)</div>

      <div class="board" id="board"></div>

      <div class="score">
        <div class="score-item"><b id="wins">0</b><span>Wins</span></div>
        <div class="score-item"><b id="losses">0</b><span>Losses</span></div>
        <div class="score-item"><b id="draws">0</b><span>Draws</span></div>
      </div>

      <div class="actions">
        <button class="btn" id="newRoundBtn">New Round</button>
        <button class="btn btn-secondary" id="resetScoreBtn">Reset Score</button>
      </div>
    </section>

    <section class="history-container">
      <h2 class="history-title">📜 Game History</h2>
      <div class="history-list" id="historyList">
        <div class="history-empty">No games played yet</div>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    const email = params.get("email") || "";

    const profileUrl = `/profile?token=${encodeURIComponent(token)}&email=${encodeURIComponent(email)}`;
    document.getElementById("backProfile").href = profileUrl;
    document.getElementById("backBtn").onclick = () => { window.location.href = profileUrl; };

    const SCORE_KEY = `xo-score-${email || "guest"}`;
    const HISTORY_KEY = `xo-history-${email || "guest"}`;
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("statusText");
    const historyListEl = document.getElementById("historyList");

    let board = Array(9).fill(null);
    let gameOver = false;
    let moveCount = 0;

    const lines = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function getScore() {
      try {
        const saved = JSON.parse(localStorage.getItem(SCORE_KEY) || "{}");
        return {
          wins: Number(saved.wins || 0),
          losses: Number(saved.losses || 0),
          draws: Number(saved.draws || 0)
        };
      } catch {
        return { wins: 0, losses: 0, draws: 0 };
      }
    }

    function saveScore(score) {
      localStorage.setItem(SCORE_KEY, JSON.stringify(score));
      document.getElementById("wins").textContent = String(score.wins);
      document.getElementById("losses").textContent = String(score.losses);
      document.getElementById("draws").textContent = String(score.draws);
    }

    function getHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function addToHistory(result, moves) {
      const history = getHistory();
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      
      history.unshift({
        result,
        moves,
        time: timeStr,
        timestamp: now.getTime()
      });

      if (history.length > 50) history.pop();
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const history = getHistory();
      
      if (history.length === 0) {
        historyListEl.innerHTML = '<div class="history-empty">No games played yet</div>';
        return;
      }

      historyListEl.innerHTML = history.map(game => {
        let resultText = "";
        let resultClass = "";
        let resultEmoji = "";

        if (game.result === "X") {
          resultText = "You Won";
          resultClass = "win";
          resultEmoji = "🎉";
        } else if (game.result === "O") {
          resultText = "Bot Won";
          resultClass = "loss";
          resultEmoji = "😵";
        } else {
          resultText = "Draw";
          resultClass = "draw";
          resultEmoji = "🤝";
        }

        return `
          <div class="history-item ${resultClass}">
            <div class="history-result">${resultEmoji} ${resultText}</div>
            <div class="history-time">${game.time} • ${game.moves} moves</div>
          </div>
        `;
      }).join("");
    }

    function winnerOf(cells) {
      for (const [a,b,c] of lines) {
        if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
          return cells[a];
        }
      }
      return null;
    }

    function render() {
      boardEl.innerHTML = "";
      board.forEach((value, idx) => {
        const btn = document.createElement("button");
        btn.className = "cell";
        if (value === "X") btn.classList.add("x");
        if (value === "O") btn.classList.add("o");
        btn.textContent = value || "";
        btn.disabled = gameOver || Boolean(value);
        btn.onclick = () => humanMove(idx);
        boardEl.appendChild(btn);
      });
    }

    function endRound(result) {
      gameOver = true;
      const score = getScore();

      if (result === "X") {
        statusEl.textContent = "🎉 You win!";
        score.wins += 1;
      } else if (result === "O") {
        statusEl.textContent = "😵 You lose! Bot wins.";
        score.losses += 1;
      } else {
        statusEl.textContent = "🤝 Draw game!";
        score.draws += 1;
      }

      saveScore(score);
      addToHistory(result, moveCount);
      render();
    }

    function findBestBotMove() {
      const empty = board.map((v, i) => v ? -1 : i).filter(i => i !== -1);

      // Bot makes mistakes 30% of the time
      const makeMistake = Math.random() < 0.30;
      if (makeMistake && empty.length > 2) {
        return empty[Math.floor(Math.random() * empty.length)];
      }

      // Try to win
      for (const i of empty) {
        const t = [...board];
        t[i] = "O";
        if (winnerOf(t) === "O") return i;
      }

      // Block player (70% of the time)
      if (Math.random() < 0.70) {
        for (const i of empty) {
          const t = [...board];
          t[i] = "X";
          if (winnerOf(t) === "X") return i;
        }
      }

      // Take center (60% chance)
      if (!board[4] && Math.random() < 0.60) return 4;

      // Take corners (50% chance)
      const corners = [0,2,6,8].filter(i => !board[i]);
      if (corners.length && Math.random() < 0.50) {
        return corners[Math.floor(Math.random() * corners.length)];
      }

      // Random move
      return empty[Math.floor(Math.random() * empty.length)];
    }

    function botMove() {
      if (gameOver) return;
      const idx = findBestBotMove();
      if (idx === undefined) return;
      board[idx] = "O";
      moveCount++;

      const winner = winnerOf(board);
      if (winner) return endRound(winner);
      if (board.every(Boolean)) return endRound("draw");

      statusEl.textContent = "Your turn (X)";
      render();
    }

    function humanMove(idx) {
      if (gameOver || board[idx]) return;

      board[idx] = "X";
      moveCount++;
      render();

      const winner = winnerOf(board);
      if (winner) return endRound(winner);
      if (board.every(Boolean)) return endRound("draw");

      statusEl.textContent = "Bot is thinking...";
      setTimeout(botMove, 350);
    }

    function newRound() {
      board = Array(9).fill(null);
      gameOver = false;
      moveCount = 0;
      statusEl.textContent = "Your turn (X)";
      render();
    }

    document.getElementById("newRoundBtn").onclick = newRound;
    document.getElementById("resetScoreBtn").onclick = () => {
      if (confirm("Reset score and history?")) {
        saveScore({ wins: 0, losses: 0, draws: 0 });
        localStorage.removeItem(HISTORY_KEY);
        renderHistory();
        newRound();
      }
    };

    saveScore(getScore());
    renderHistory();
    newRound();
  </script>
</body>
</html>

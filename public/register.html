<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - LudoX</title>
  <style>
    :root {
      --red:    #FF4757;
      --blue:   #2E86FF;
      --green:  #2ED573;
      --yellow: #FFD32A;
      --navy:   #0D1B3E;
      --navy2:  #112247;
      --navy3:  #1a2f5a;
      --white:  #FFFFFF;
      --text:   #C8D6F0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--navy);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--yellow), #FF9500);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .brand {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 1.5rem;
      color: white;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      transition: color 0.2s;
      margin-left: 24px;
    }

    .nav-links a:hover {
      color: #fff;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 100px 20px 60px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      margin-top: 60px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 48px 40px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    h2 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 2rem;
      color: white;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .subtitle {
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 900;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.95rem;
      outline: none;
    }

    input::placeholder {
      color: rgba(200,214,240,0.5);
    }

    input:focus, select:focus {
      border-color: var(--blue);
    }

    select {
      cursor: pointer;
    }

    select option {
      background: var(--navy2);
      color: white;
    }

    input[type="file"] {
      padding: 12px 16px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    input[type="file"]::file-selector-button {
      background: rgba(46,134,255,0.2);
      border: 1px solid rgba(46,134,255,0.4);
      color: var(--blue);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      margin-right: 12px;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--green), #20b35f);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      opacity: 0.9;
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text);
    }

    .footer-text a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }

    .footer-text a:hover {
      color: var(--yellow);
    }

    #message {
      margin-top: 16px;
      text-align: center;
      font-weight: 700;
      min-height: 20px;
      font-size: 0.9rem;
    }

    .error {
      color: var(--red);
    }

    .success {
      color: var(--green);
    }



    /* Footer */
    footer {
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
      gap: 16px;
      background: rgba(13,27,62,0.8);
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .footer-links a:hover {
      color: #fff;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="logo">
      <div class="logo-icon">🎲</div>
      <span class="brand">LudoX</span>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/login">Log In</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="emoji">🎯</div>
        <h2>Join LudoX</h2>
        <p class="subtitle">Create your free account</p>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label>Nickname</label>
          <input type="text" id="nickname" placeholder="KingSlayer99" required>
        </div>

        <div class="form-group full">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group full">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" required>
        </div>

        <div class="form-group">
          <label>Country</label>
          <input type="text" id="country" placeholder="e.g. USA" required>
        </div>

        <div class="form-group">
          <label>Gender</label>
          <select id="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">♂ Male</option>
            <option value="Female">♀ Female</option>
            <option value="Other">⚧ Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Age</label>
          <input type="number" id="age" placeholder="18" min="1" max="150" required>
        </div>

        <div class="form-group">
          <label>Profile Picture (Optional)</label>
          <input type="file" id="profile" accept="image/*">
        </div>
      </div>

      <button onclick="register()">🎲 Create Account</button>

      <div id="message"></div>

      <p class="footer-text">
        Already have an account? <a href="/login">Log in here</a>
      </p>
    </div>
  </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-left">
      <div style="width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg,var(--yellow),#FF9500); display: flex; align-items: center; justify-content: center;">🎲</div>
      <span class="brand" style="font-size: 1.2rem;">LudoX</span>
      <span style="font-size: 0.875rem; font-weight: 700; color: var(--text);">© 2026 All rights reserved</span>
    </div>
    <div class="footer-links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
      <a href="/contact">Contact</a>
    </div>
  </footer>

  <script>
    const API_URL = "http://localhost:3000";

    async function register() {
      const name = document.getElementById("name").value;
      const nickname = document.getElementById("nickname").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const country = document.getElementById("country").value;
      const gender = document.getElementById("gender").value;
      const age = document.getElementById("age").value;
      const profileFile = document.getElementById("profile").files[0];

      if (!name || !nickname || !email || !password || !country || !gender || !age) {
        const msg = document.getElementById("message");
        msg.innerText = "⚠️ All fields are required!";
        msg.className = "error";
        return;
      }

      const formData = new FormData();
      formData.append("name", name);
      formData.append("nickname", nickname);
      formData.append("email", email);
      formData.append("password", password);
      formData.append("country", country);
      formData.append("gender", gender);
      formData.append("age", age);
      if (profileFile) {
        formData.append("profile", profileFile);
      }

      try {
        const res = await fetch(API_URL + "/register", {
          method: "POST",
          body: formData
        });

        const msg = document.getElementById("message");

        if (res.ok || res.status === 200) {
          msg.innerText = "✅ Registration successful! Redirecting to login...";
          msg.className = "success";
          setTimeout(() => {
            window.location.href = "/login";
          }, 1500);
        } else if (res.status === 302 || res.status === 301 || res.status === 307) {
          // Redirect response
          msg.innerText = "✅ Registration successful! Redirecting to login...";
          msg.className = "success";
          setTimeout(() => {
            window.location.href = "/login";
          }, 1500);
        } else {
          const data = await res.text();
          msg.innerText = data || "❌ Registration failed";
          msg.className = "error";
        }
      } catch (err) {
        console.error("Fetch error:", err);
        const msg = document.getElementById("message");
        msg.innerText = "❌ Error: " + err.message;
        msg.className = "error";
      }
    }

  </script>

</body>
</html>

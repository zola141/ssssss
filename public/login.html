<!DOCTYPE html>
<html>
<head>
  <title>Login - LudoX</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:    #FF4757;
      --blue:   #2E86FF;
      --green:  #2ED573;
      --yellow: #FFD32A;
      --navy:   #0D1B3E;
      --navy2:  #112247;
      --navy3:  #1a2f5a;
      --white:  #FFFFFF;
      --text:   #C8D6F0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(13,27,62,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--yellow), #FF9500);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .brand {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: white;
      letter-spacing: 0.02em;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      transition: color 0.2s;
      margin-left: 24px;
    }

    .nav-links a:hover {
      color: #fff;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 100px 20px 60px;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .main-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(46,134,255,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,71,87,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      backdrop-filter: blur(10px);
      padding: 48px 40px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      animation: fadeIn 0.6s ease-in-out;
    }

    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      color: white;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 900;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder {
      color: rgba(200,214,240,0.5);
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(46,134,255,0.15);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--blue), #1a6edb);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(46,134,255,0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(46,134,255,0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text);
    }

    .footer-text a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 800;
      transition: color 0.2s;
    }

    .footer-text a:hover {
      color: var(--yellow);
    }

    #message {
      margin-top: 16px;
      text-align: center;
      font-weight: 700;
      min-height: 20px;
      font-size: 0.9rem;
    }

    .error {
      color: var(--red);
    }

    .success {
      color: var(--green);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .decorative-dice {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0.08;
      animation: float 6s ease-in-out infinite;
    }

    .dice-1 { top: 15%; left: 10%; }
    .dice-2 { top: 70%; right: 15%; animation-delay: 2s; }
    .dice-3 { bottom: 20%; left: 20%; animation-delay: 4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    /* Footer */
    footer {
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
      gap: 16px;
      background: rgba(13,27,62,0.8);
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: #fff;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="logo">
      <div class="logo-icon">🎲</div>
      <span class="brand">LudoX</span>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/register">Sign Up</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <div class="decorative-dice dice-1">🎲</div>
    <div class="decorative-dice dice-2">⚄</div>
    <div class="decorative-dice dice-3">⚂</div>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="emoji">🎮</div>
        <h2>Welcome Back!</h2>
        <p class="subtitle">Log in to continue playing</p>
      </div>

      <div class="form-group">
        <label>Nickname</label>
        <input type="text" id="nickname" placeholder="Enter your nickname">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button onclick="login()">🎲 Log In</button>

      <div id="message"></div>

      <p class="footer-text">
        Don't have an account? <a href="/register">Sign up here</a>
      </p>
    </div>
  </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-left">
      <div style="width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg,var(--yellow),#FF9500); display: flex; align-items: center; justify-content: center;">🎲</div>
      <span class="brand" style="font-size: 1.2rem;">LudoX</span>
      <span style="font-size: 0.875rem; font-weight: 700; color: var(--text);">© 2026 All rights reserved</span>
    </div>
    <div class="footer-links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
      <a href="/contact">Contact</a>
    </div>
  </footer>

  <script>
    const API_URL = "http://localhost:3000";

    async function login() {
      const nickname = document.getElementById("nickname").value;
      const password = document.getElementById("password").value;

      if (!nickname || !password) {
        const msg = document.getElementById("message");
        msg.innerText = "⚠️ Nickname and password are required";
        msg.className = "error";
        return;
      }

      const res = await fetch(API_URL + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nickname, password })
      });

      if (res.redirected) {
        window.location.href = res.url;
        return;
      }

      const data = await res.text();
      const msg = document.getElementById("message");
      msg.innerText = data;
      msg.className = "error";
    }
  </script>

</body>
</html>
